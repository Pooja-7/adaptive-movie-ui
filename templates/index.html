
<!DOCTYPE html>

<html>

<head>

<title>
Adaptive Movie UI
</title>

<link
rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}"
>

</head>

<body class="{{ theme }}">

<div class="box">

<h1>
Adaptive Movie Recommendation
</h1>

<form method="POST">

<select name="movie">

{% for movie in movies %}

<option>

{{ movie }}

</option>

{% endfor %}

</select>

<br>

<button>

Recommend

</button>

</form>

{% if selected %}

<h3>

Selected:
{{ selected }}

</h3>

{% endif %}

{% for movie in recommendations %}

<div class="card">

{{ movie }}

</div>

{% endfor %}

</div>

</body>

</html>
